name: Build and Release Zenith Auto Clicker

on:
  release:
    types: [published]
  workflow_dispatch:  # Allows manual testing from GitHub Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_windows.txt
          pip install pyinstaller Pillow

      - name: Generate Icon
        run: python build_scripts/create_icon.py

      - name: Build with PyInstaller
        run: pyinstaller zenith.spec

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" build_scripts\zenith_windows.iss
        
      - name: Upload Windows Asset to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/Zenith_Setup.exe
          asset_name: Zenith_Setup_Windows.exe
          asset_content_type: application/octet-stream

      - name: Upload Windows Artifact (for manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: Zenith_Setup_Windows
          path: dist/Zenith_Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y xdotool

      - name: Run Build Script
        run: |
          chmod +x build_scripts/build_linux_appimage.sh
          bash build_scripts/build_linux_appimage.sh

      - name: Upload Linux Asset to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ZenithAutoClicker-x86_64.AppImage
          asset_name: ZenithAutoClicker-Linux-x86_64.AppImage
          asset_content_type: application/x-executable

      - name: Upload Linux Artifact (for manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: ZenithAutoClicker-Linux-x86_64
          path: ZenithAutoClicker-x86_64.AppImage
